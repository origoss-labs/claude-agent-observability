# Ingest gateway. Single OTLP endpoint (the one component, besides Grafana, shared
# by both stacks). Fans out: metrics->VictoriaMetrics (dotted) + Prometheus
# (normalised); logs->Loki + VictoriaLogs; traces->Tempo. Exposed to the laptop via
# a NodePort Service (manifests/networking/alloy-otlp-nodeport.yaml) at
# localhost:4317/:4318.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: "1.8.2"   # pinned to the live chart version
    helm:
      values: |
        controller:
          type: deployment
          replicas: 1
        alloy:
          # deltatocumulative is an experimental Alloy component; this flag lets it load
          stabilityLevel: experimental
          # declare the OTLP ports on the pod (the NodePort Service targets these)
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              protocol: TCP
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP
          configMap:
            content: |-
              logging {
                level  = "info"
                format = "logfmt"
              }

              otelcol.receiver.otlp "default" {
                grpc { endpoint = "0.0.0.0:4317" }
                http { endpoint = "0.0.0.0:4318" }
                output {
                  metrics = [otelcol.processor.batch.default.input]
                  logs    = [otelcol.processor.batch.default.input]
                  traces  = [otelcol.processor.batch.default.input]
                }
              }

              otelcol.processor.batch "default" {
                output {
                  metrics = [otelcol.processor.deltatocumulative.default.input]
                  // logs fan out to BOTH stacks' log stores
                  logs    = [
                    otelcol.exporter.loki.default.input,            // Prometheus stack
                    otelcol.exporter.otlphttp.victorialogs.input,   // Victoria stack
                  ]
                  traces  = [otelcol.exporter.otlp.tempo.input]
                }
              }

              // delta -> cumulative: Claude exports delta-temporality metrics; both VM's
              // OTLP ingest and the Prometheus OTLP receiver want cumulative.
              otelcol.processor.deltatocumulative "default" {
                output {
                  // one cumulative stream, fanned to BOTH metrics stores
                  metrics = [
                    otelcol.exporter.otlphttp.vmnative.input,       // Victoria stack: dotted names
                    otelcol.exporter.otlphttp.prometheus.input,     // Prometheus stack: normalised
                  ]
                }
              }

              // metrics -> VictoriaMetrics, OTLP-native. VM keeps dotted OTLP names
              // (claude_code.token.usage) — what the 24640 VictoriaStack dashboard queries.
              otelcol.exporter.otlphttp "vmnative" {
                client {
                  endpoint = "http://victoriametrics.observability.svc.cluster.local:8428/opentelemetry"
                  tls { insecure = true }
                }
              }

              // metrics -> Prometheus, native OTLP receiver. Prometheus normalises to
              // claude_code_token_usage_tokens_total etc. — what 25255 + ColeMurray query.
              otelcol.exporter.otlphttp "prometheus" {
                client {
                  endpoint = "http://prometheus-server.observability.svc.cluster.local:9090/api/v1/otlp"
                  tls { insecure = true }
                }
              }

              // logs -> Loki (Prometheus stack + Tempo trace->log correlation)
              otelcol.exporter.loki "default" {
                forward_to = [loki.write.default.receiver]
              }
              loki.write "default" {
                endpoint {
                  url = "http://loki.observability.svc.cluster.local:3100/loki/api/v1/push"
                }
              }

              // logs -> VictoriaLogs, OTLP-native (attributes become VL fields; Victoria stack)
              otelcol.exporter.otlphttp "victorialogs" {
                client {
                  endpoint = "http://victorialogs.observability.svc.cluster.local:9428/insert/opentelemetry"
                  tls { insecure = true }
                }
              }

              // traces -> Tempo (OTLP gRPC), single shared store
              otelcol.exporter.otlp "tempo" {
                client {
                  endpoint = "tempo.observability.svc.cluster.local:4317"
                  tls { insecure = true }
                }
              }
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
