# Visualisation — the one component (besides Alloy's ingest) shared by both stacks.
# Datasources: Prometheus + Loki (Prometheus stack), VictoriaMetrics + VictoriaLogs
# (Victoria stack, via VM datasource plugins), and a shared Tempo wired for
# trace->logs (Loki) and trace->metrics (Prometheus). Dashboards load from any
# ConfigMap labelled grafana_dashboard=1 (see manifests/dashboards/).
# UI on localhost:3000 via NodePort 30300.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: "10.5.15"   # pinned to live chart version
    helm:
      values: |
        fullnameOverride: grafana
        adminUser: admin
        adminPassword: admin        # local-only v1 convenience; do not ship
        # VM datasource plugins for the Victoria stack (24640 dashboard)
        plugins:
          - victoriametrics-metrics-datasource
          - victoriametrics-logs-datasource
        persistence:
          enabled: false            # everything is provisioned from Git
        service:
          type: NodePort
          nodePort: 30300           # must match kind/cluster.yaml (host 3000)
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              # --- Prometheus stack (25255 + ColeMurray) ---
              - name: Prometheus
                uid: prometheus
                type: prometheus
                access: proxy
                url: http://prometheus-server.observability.svc.cluster.local:9090
                isDefault: true
              - name: Loki
                uid: loki
                type: loki
                access: proxy
                url: http://loki.observability.svc.cluster.local:3100
              # --- Victoria stack (24640), via VM datasource plugins ---
              - name: VictoriaMetrics
                uid: vmetrics
                type: victoriametrics-metrics-datasource
                access: proxy
                url: http://victoriametrics.observability.svc.cluster.local:8428
              - name: VictoriaLogs
                uid: vlogs
                type: victoriametrics-logs-datasource
                access: proxy
                url: http://victorialogs.observability.svc.cluster.local:9428
              # --- shared ---
              - name: Tempo
                uid: tempo
                type: tempo
                access: proxy
                url: http://tempo.observability.svc.cluster.local:3200
                jsonData:
                  tracesToLogsV2:
                    datasourceUid: loki
                    filterByTraceID: true
                    spanStartTimeShift: "-1h"
                    spanEndTimeShift: "1h"
                  tracesToMetrics:
                    datasourceUid: prometheus
                  serviceMap:
                    datasourceUid: prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
