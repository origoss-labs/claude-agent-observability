# Applies plain manifests under manifests/networking/ — currently the NodePort
# Service that exposes Alloy's OTLP ports to the laptop via kind extraPortMappings.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networking
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/origoss-labs/claude-agent-observability.git
    targetRevision: main
    path: manifests/networking
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
