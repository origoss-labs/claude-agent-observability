# Metrics store for the VICTORIA stack (serves the 24640 VictoriaStack dashboard).
# Single-node VictoriaMetrics: one binary, local disk, no object storage. Alloy
# pushes OTLP-native metrics here; VM keeps the dotted OTLP names by default
# (claude_code.token.usage), which 24640 queries via the VM datasource plugin.
#
# Service DNS used by Alloy (push) + Grafana (query): victoriametrics.observability:8428
# (headless service, named by server.fullnameOverride below).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-single
    targetRevision: "0.39.0"   # pinned to live chart version
    helm:
      values: |
        server:
          fullnameOverride: victoriametrics
          retentionPeriod: 3d
          persistentVolume:
            enabled: true
            size: 5Gi
          # VM ingests OTLP at /opentelemetry/v1/metrics out of the box and keeps
          # dotted names (usePrometheusNaming defaults off).
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
