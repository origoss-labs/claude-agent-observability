# Ingest gateway — HOSTED deployment (ADR 0004). Alloy is the single OTLP entry point
# for all Claude Code developer sessions. Fan-out: metrics->VictoriaMetrics,
# logs->VictoriaLogs, traces->Tempo (no Prometheus, no Loki — those are local-only).
#
# HTTP/protobuf :4318 is the primary hosted ingest port (easier to route behind
# standard HTTP proxies and TLS termination); gRPC :4317 is retained for parity.
# The public Ingress/TLS wiring is the SEPARATE foundation-repo PR (#185b) —
# this Application exposes Alloy as a ClusterIP Service only.
#
# deltatocumulative processor: Claude Code exports delta-temporality metrics; VM's
# OTLP ingest wants cumulative. Kept from the local stack.
#
# Content-agnostic: no filtering of prompt or tool bodies here — that is controlled
# by the client's OTEL_LOG_USER_PROMPTS / OTEL_LOG_TOOL_CONTENT flags.
#
# Destination server: set by the foundation cluster's Argo CD multi-source app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hosted-alloy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: "1.8.2"   # pinned; appVersion v1.16.1
    helm:
      values: |
        controller:
          type: deployment
          replicas: 1
        alloy:
          # deltatocumulative is an experimental Alloy component; this flag lets it load
          stabilityLevel: experimental
          # declare the OTLP ports on the pod (the ClusterIP Service targets these)
          extraPorts:
            - name: otlp-grpc
              port: 4317
              targetPort: 4317
              protocol: TCP
            - name: otlp-http
              port: 4318
              targetPort: 4318
              protocol: TCP
          configMap:
            content: |-
              logging {
                level  = "info"
                format = "logfmt"
              }

              // include_metadata=true exposes the incoming request headers (the
              // X-Scope-OrgID that agentgateway stamps from the JWT tenant_id) to the
              // from_context lookups below. http/protobuf is the primary hosted path.
              otelcol.receiver.otlp "default" {
                http { endpoint = "0.0.0.0:4318" include_metadata = true }
                grpc { endpoint = "0.0.0.0:4317" include_metadata = true }
                output {
                  metrics = [otelcol.processor.batch.default.input]
                  logs    = [otelcol.processor.batch.default.input]
                  traces  = [otelcol.processor.batch.default.input]
                }
              }

              // metadata_keys is LOAD-BEARING for per-developer isolation (#186): it
              // partitions batches per tenant AND re-attaches X-Scope-OrgID to the
              // outgoing context so the exporters' from_context can read it. Drop it and
              // batching merges all developers into one stream and loses the header.
              otelcol.processor.batch "default" {
                metadata_keys = ["X-Scope-OrgID"]
                output {
                  metrics = [otelcol.processor.deltatocumulative.default.input]
                  logs    = [otelcol.exporter.otlphttp.victorialogs.input]
                  traces  = [otelcol.exporter.otlp.tempo.input]
                }
              }

              // delta -> cumulative: Claude exports delta-temporality metrics; VM's
              // OTLP ingest wants cumulative (silently drops delta otherwise).
              otelcol.processor.deltatocumulative "default" {
                output {
                  metrics = [otelcol.exporter.otlphttp.vmnative.input]
                }
              }

              // Tenant relabelling. The wire tenant is the NUMERIC tenant_id (ADR 0004):
              // VictoriaMetrics + VictoriaLogs read it from the `AccountID` header;
              // Tempo reads it from `X-Scope-OrgID`. Both derive from the single
              // incoming X-Scope-OrgID metadata captured by the receiver.
              otelcol.auth.headers "accountid_tenant" {
                header {
                  key          = "AccountID"
                  from_context = "X-Scope-OrgID"
                }
              }
              otelcol.auth.headers "orgid_tenant" {
                header {
                  key          = "X-Scope-OrgID"
                  from_context = "X-Scope-OrgID"
                }
              }

              // metrics -> VictoriaMetrics CLUSTER vminsert; header multitenancy means the
              // tenant comes from the AccountID header, not the URL path. VM keeps dotted
              // OTLP names.
              otelcol.exporter.otlphttp "vmnative" {
                client {
                  endpoint = "http://vminsert.observability.svc.cluster.local:8480/insert/opentelemetry"
                  auth     = otelcol.auth.headers.accountid_tenant.handler
                  tls { insecure = true }
                }
              }

              // logs -> VictoriaLogs; AccountID header selects the per-developer tenant.
              otelcol.exporter.otlphttp "victorialogs" {
                client {
                  endpoint = "http://victorialogs.observability.svc.cluster.local:9428/insert/opentelemetry"
                  auth     = otelcol.auth.headers.accountid_tenant.handler
                  tls { insecure = true }
                }
              }

              // traces -> Tempo OTLP gRPC; X-Scope-OrgID selects the per-developer tenant.
              otelcol.exporter.otlp "tempo" {
                client {
                  endpoint = "tempo.observability.svc.cluster.local:4317"
                  auth     = otelcol.auth.headers.orgid_tenant.handler
                  tls { insecure = true }
                }
              }
  destination:
    server: https://kubernetes.default.svc   # placeholder — overridden by foundation Argo CD
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
