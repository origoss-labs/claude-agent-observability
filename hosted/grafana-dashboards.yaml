# Applies dashboard ConfigMaps from manifests/dashboards/. The Grafana sidecar watches
# for ConfigMaps labelled grafana_dashboard=1.
#
# Hosted deploys ONLY the 24640 VictoriaStack dashboard (it targets VictoriaMetrics,
# uid=vmetrics, with dotted OTLP metric names). The 25255 + ColeMurray dashboards are
# excluded via directory.include: they hard-code the Prometheus datasource
# (uid=prometheus, absent here) and Prometheus-NORMALISED metric names
# (claude_code_cost_usage_total) that do not exist in the VM-native dotted ingest.
# #188 decision: hosted STANDARDISES on the VM-native 24640 dashboard rather than
# rewriting the two community dashboards to dotted names (one ingest = one naming, and
# 24640 is the curated, comprehensive Claude Code dashboard). 25255 + ColeMurray remain
# LOCAL-only — the kind dual-stack keeps Prometheus (ADR 0003 / ADR 0004).
#
# Destination server: set by the foundation cluster's Argo CD multi-source app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hosted-grafana-dashboards
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://github.com/origoss-labs/claude-agent-observability.git
    targetRevision: v0.1.0   # labs release tag. The foundation observability.yaml recurses
                             # hosted/ and applies this child verbatim — it does NOT override
                             # child revisions, so 'main' here would float past the release pin.
    path: manifests/dashboards
    directory:
      include: 'claude-code-victoriastack.configmap.yaml'
  destination:
    server: https://kubernetes.default.svc   # placeholder — overridden by foundation Argo CD
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
