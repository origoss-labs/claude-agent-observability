# Visualisation — HOSTED deployment (ADR 0004). Three datasources only:
# VictoriaMetrics (Prometheus-type plugin), VictoriaLogs, Tempo.
# No Prometheus datasource, no Loki datasource (those are local-stack only).
#
# Authentication (#187): native OIDC -> Keycloak agentregistry realm (Google upstream),
# mirroring Argo CD SSO (ADR 0023). Developer/Admin roles by email allowlist. The
# grafana-admin Secret is retained only as a break-glass local login. Public Ingress at
# grafana.ops.oracle-apps.origoss.com (Traefik + cert-manager HTTP-01), kept DISABLED
# until the DNS A record resolves. Per-tenant reads go through the agentgateway-obs-read
# proxy (datasource oauthPassThru forwards the login token; the proxy stamps the tenant).
#
# Dashboards load from any ConfigMap labelled grafana_dashboard=1 in the cluster.
# The existing manifests/dashboards/ ConfigMaps are still usable; the hosted
# grafana-dashboards Application (see hosted/grafana-dashboards.yaml) applies them.
#
# Destination server: set by the foundation cluster's Argo CD multi-source app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hosted-grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: "10.5.15"   # pinned; appVersion 12.3.1
    helm:
      values: |
        fullnameOverride: grafana
        # Break-glass local admin from an out-of-band Secret (NOT in git). Primary login
        # is OIDC (below); this is the fallback if OIDC is misconfigured. Create once:
        #   kubectl -n observability create secret generic grafana-admin \
        #     --from-literal=admin-user=admin --from-literal=admin-password=<strong-pw>
        admin:
          existingSecret: grafana-admin
          userKey: admin-user
          passwordKey: admin-password
        grafana.ini:
          server:
            root_url: https://grafana.ops.oracle-apps.origoss.com
          # Explicitly deny anonymous access — don't rely on the chart default for an app
          # that becomes public.
          auth.anonymous:
            enabled: false
          # Native OIDC -> Keycloak agentregistry realm (Google upstream), mirroring Argo
          # CD SSO (ADR 0023). client_id/secret come from the grafana-oidc Secret via
          # envValueFrom (GF_AUTH_GENERIC_OAUTH_CLIENT_ID/SECRET) — never in git.
          auth.generic_oauth:
            enabled: true
            name: Keycloak
            scopes: "openid email profile"
            auth_url: https://auth.oracle-apps.origoss.com/realms/agentregistry/protocol/openid-connect/auth
            token_url: https://auth.oracle-apps.origoss.com/realms/agentregistry/protocol/openid-connect/token
            api_url: https://auth.oracle-apps.origoss.com/realms/agentregistry/protocol/openid-connect/userinfo
            email_attribute_path: email
            # Admin = email allowlist (ADR 0023: Google brokers email, not groups). This
            # list MUST match adminEmails in the foundation agentgateway-obs-read values —
            # the same tenant-key decision evaluated on both sides. Replace the placeholder;
            # everyone not listed is a Viewer (read-scoped to their own tenant by the proxy).
            role_attribute_path: "contains(['replace-me@origoss.invalid'], email) && 'Admin' || 'Viewer'"
            allow_sign_up: true
        # client id/secret from the out-of-band grafana-oidc Secret (foundation RUNBOOK §3).
        envValueFrom:
          GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
            secretKeyRef:
              name: grafana-oidc
              key: client-id
          GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
            secretKeyRef:
              name: grafana-oidc
              key: client-secret
        # Public Ingress — kept DISABLED until the DNS A record for the host resolves
        # (cert-manager HTTP-01 would otherwise burn the LE prod rate limit; ADR 0017).
        # Flip enabled: true once `dig +short grafana.ops.oracle-apps.origoss.com` returns
        # the NLB IP.
        ingress:
          enabled: true   # DNS grafana.ops.oracle-apps.origoss.com -> NLB verified 2026-06-09
          ingressClassName: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          hosts:
            - grafana.ops.oracle-apps.origoss.com
          tls:
            - secretName: grafana-tls
              hosts:
                - grafana.ops.oracle-apps.origoss.com
        # VM datasource plugins for VictoriaMetrics + VictoriaLogs queries
        plugins:
          - victoriametrics-metrics-datasource
          - victoriametrics-logs-datasource
        persistence:
          enabled: false            # everything provisioned from Git; stateless Grafana
        service:
          type: ClusterIP           # no NodePort — hosted; public access via Ingress (other PR)
        sidecar:
          dashboards:
            enabled: true
            label: grafana_dashboard
            labelValue: "1"
            searchNamespace: ALL
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              # All reads go through the agentgateway-obs-read proxy (#187). oauthPassThru
              # forwards the logged-in user's Keycloak token; the proxy validates it and
              # stamps the store tenant header from the token's numeric tenant_id, so a
              # Developer sees ONLY their own tenant (the per-tenant /select/prometheus form
              # — header-driven, no tenant in the path).
              - name: VictoriaMetrics
                uid: vmetrics
                type: victoriametrics-metrics-datasource
                access: proxy
                url: http://agentgateway-obs-read.agentgateway-obs-read.svc.cluster.local:8481/select/prometheus
                isDefault: true
                jsonData:
                  oauthPassThru: true
              # Admin-only cross-tenant metrics (VM /select/multitenant). Grafana OSS shows
              # every datasource to every user, but the proxy DENIES this path for
              # non-admins (email allowlist), so only Admins get data here — the isolation
              # is enforced at the proxy, not by Grafana datasource permissions.
              - name: VictoriaMetrics (Admin — all tenants)
                uid: vmetrics-admin
                type: victoriametrics-metrics-datasource
                access: proxy
                url: http://agentgateway-obs-read.agentgateway-obs-read.svc.cluster.local:8481/select/multitenant/prometheus
                jsonData:
                  oauthPassThru: true
              # VictoriaLogs — LogsQL. Per-developer only (admin cross-tenant logs deferred:
              # VictoriaLogs has no /select/multitenant endpoint).
              - name: VictoriaLogs
                uid: vlogs
                type: victoriametrics-logs-datasource
                access: proxy
                url: http://agentgateway-obs-read.agentgateway-obs-read.svc.cluster.local:9428
                jsonData:
                  oauthPassThru: true
              # Tempo — trace waterfall; trace->logs wired to VictoriaLogs. Admins get the
              # cross-tenant aggregate (proxy stamps the pipe-list X-Scope-OrgID).
              - name: Tempo
                uid: tempo
                type: tempo
                access: proxy
                url: http://agentgateway-obs-read.agentgateway-obs-read.svc.cluster.local:3200
                jsonData:
                  oauthPassThru: true
                  # Tempo streaming search does NOT forward oauthPassThru headers reliably
                  # (grafana/grafana#81998) — the proxy would 401 it. Keep streaming off.
                  streamingEnabled: false
                  tracesToLogsV2:
                    datasourceUid: vlogs
                    filterByTraceID: true
                    spanStartTimeShift: "-1h"
                    spanEndTimeShift: "1h"
                  tracesToMetrics:
                    datasourceUid: vmetrics
                  serviceMap:
                    datasourceUid: vmetrics
  destination:
    server: https://kubernetes.default.svc   # placeholder — overridden by foundation Argo CD
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
