# Traces store — HOSTED deployment (ADR 0004). Tempo monolithic single-binary
# (NOT tempo-distributed). Stores traces on the local filesystem backend.
#
# Multitenancy is ENABLED (#186): Tempo with multitenancyEnabled=true requires
# X-Scope-OrgID on every write/read and segregates traces per tenant. Alloy now stamps
# X-Scope-OrgID (the numeric tenant_id from agentgateway) on its trace exporter, so the
# header-less ingest that #185 relied on no longer happens. The per-tenant Grafana read
# (Tempo datasource sending the logged-in user's X-Scope-OrgID) is wired in #187.
#
# OTLP gRPC :4317 (Alloy -> tempo:4317); query API :3200 (Grafana datasource).
# Destination server: set by the foundation cluster's Argo CD multi-source app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hosted-tempo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo            # monolithic single-binary chart (NOT tempo-distributed)
    targetRevision: "1.24.4"   # pinned; appVersion 2.9.0
    helm:
      values: |
        fullnameOverride: tempo
        persistence:
          enabled: true
          size: 20Gi
        tempo:
          # Per-tenant isolation (#186): requires X-Scope-OrgID on every request. Alloy
          # stamps it from the numeric tenant_id; requests without it land in the default
          # tenant (the agentgateway gate rejects tokens lacking the tenant claim, so a
          # header always reaches Tempo in the authenticated path).
          multitenancyEnabled: true
          retention: 720h     # 30 days
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          # metricsGenerator disabled — avoids back-pressure on VM and keeps
          # the stack footprint small. Enable later if span-derived RED metrics wanted.
          metricsGenerator:
            enabled: false
  destination:
    server: https://kubernetes.default.svc   # placeholder — overridden by foundation Argo CD
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
