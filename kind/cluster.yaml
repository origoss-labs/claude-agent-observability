# kind cluster for the Claude Agent Observability platform (v1, single machine).
#
# extraPortMappings expose two cluster NodePorts on localhost so that:
#   - `claude` on this laptop can push OTLP to Alloy at localhost:4317 / :4318
#   - the browser can reach Grafana at localhost:3000
#
# hostPort  -> containerPort (a Service NodePort inside the cluster)
#   4317    -> 31317   Alloy OTLP gRPC   (apps/alloy.yaml service.nodePort)
#   4318    -> 31318   Alloy OTLP HTTP   (apps/alloy.yaml service.nodePort)
#   3000    -> 30300   Grafana UI        (apps/grafana.yaml service.nodePort)
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: claude-obs
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 31317
        hostPort: 4317
        protocol: TCP
      - containerPort: 31318
        hostPort: 4318
        protocol: TCP
      - containerPort: 30300
        hostPort: 3000
        protocol: TCP
